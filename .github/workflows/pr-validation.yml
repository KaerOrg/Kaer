name: PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── App mobile ──────────────────────────────────────────────────────────────
  mobile:
    name: Mobile — TypeScript + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (mobile)
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Unit tests (mobile)
        working-directory: apps/mobile
        run: npx jest --no-coverage --ci --forceExit

  # ─── App web ─────────────────────────────────────────────────────────────────
  web:
    name: Web — TypeScript + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (web)
        working-directory: apps/web
        run: npx tsc -b --noEmit

      - name: Unit tests (web)
        working-directory: apps/web
        run: npm test
